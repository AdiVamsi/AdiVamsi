<svg width="860" height="268" viewBox="0 0 860 268" xmlns="http://www.w3.org/2000/svg">

  <!-- Window shadow / outer glow -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Window background -->
  <rect width="860" height="268" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- Title bar -->
  <rect width="860" height="42" rx="10" fill="#1c2128"/>
  <rect y="30" width="860" height="12" fill="#1c2128"/>
  <line x1="0" y1="42" x2="860" y2="42" stroke="#30363d" stroke-width="1"/>

  <!-- Traffic dots -->
  <circle cx="24" cy="21" r="6" fill="#ff5f57"/>
  <circle cx="46" cy="21" r="6" fill="#febc2e"/>
  <circle cx="68" cy="21" r="6" fill="#28c840"/>

  <!-- Title bar text -->
  <text x="430" y="22" text-anchor="middle" dominant-baseline="middle"
        font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="12" fill="#8b949e">
    incident.response — 503: You're On Call
  </text>

  <!-- ── ALERT HEADER ── -->
  <!-- Pulsing alert badge -->
  <rect x="20" y="56" width="188" height="26" rx="4"
        fill="rgba(247,129,102,0.10)" stroke="rgba(247,129,102,0.35)" stroke-width="1"/>
  <circle cx="37" cy="69" r="5" fill="#f78166">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <text x="50" y="70" dominant-baseline="middle"
        font-family="ui-monospace,'SF Mono',Consolas,monospace"
        font-size="11" font-weight="700" fill="#f78166" letter-spacing="0.05em">⚠ PRODUCTION ALERT</text>

  <!-- Alert metadata -->
  <text x="218" y="70" dominant-baseline="middle"
        font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="11" fill="#8b949e">
    sme-engine API  ·  00:47  ·  PagerDuty #INC-2041
  </text>

  <!-- Separator -->
  <line x1="20" y1="94" x2="840" y2="94" stroke="#30363d" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ── METRICS ── -->

  <!-- ERROR RATE row -->
  <text x="20" y="115" dominant-baseline="middle"
        font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="10" fill="#8b949e" letter-spacing="0.06em">ERROR RATE</text>
  <text x="20" y="135" dominant-baseline="middle"
        font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="20" font-weight="700" fill="#f78166">67.2%</text>
  <!-- bar track -->
  <rect x="110" y="121" width="560" height="7" rx="3.5" fill="#21262d"/>
  <!-- bar fill animated -->
  <rect x="110" y="121" width="0" height="7" rx="3.5" fill="#f78166">
    <animate attributeName="width" from="0" to="376" dur="1.1s" begin="0.2s" fill="freeze"/>
  </rect>
  <text x="684" y="125" dominant-baseline="middle"
        font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="10" fill="#f78166">CRITICAL</text>

  <!-- P99 LATENCY row -->
  <text x="20" y="155" dominant-baseline="middle"
        font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="10" fill="#8b949e" letter-spacing="0.06em">P99 LATENCY</text>
  <text x="20" y="175" dominant-baseline="middle"
        font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="20" font-weight="700" fill="#f78166">4,200ms</text>
  <rect x="110" y="162" width="560" height="7" rx="3.5" fill="#21262d"/>
  <rect x="110" y="162" width="0" height="7" rx="3.5" fill="#f78166">
    <animate attributeName="width" from="0" to="476" dur="1.1s" begin="0.5s" fill="freeze"/>
  </rect>
  <text x="684" y="166" dominant-baseline="middle"
        font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="10" fill="#f78166">CRITICAL</text>

  <!-- DB CONNECTIONS row -->
  <text x="20" y="195" dominant-baseline="middle"
        font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="10" fill="#8b949e" letter-spacing="0.06em">DB CONNECTIONS</text>
  <text x="20" y="215" dominant-baseline="middle"
        font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="20" font-weight="700" fill="#f78166">387 / 50</text>
  <rect x="110" y="202" width="560" height="7" rx="3.5" fill="#21262d"/>
  <rect x="110" y="202" width="0" height="7" rx="3.5" fill="#f78166">
    <animate attributeName="width" from="0" to="560" dur="1.1s" begin="0.8s" fill="freeze"/>
  </rect>
  <text x="684" y="206" dominant-baseline="middle"
        font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="10" fill="#f78166">MAXED</text>

  <!-- ── FOOTER / CTA ── -->
  <line x1="0" y1="234" x2="860" y2="234" stroke="#30363d" stroke-width="1"/>

  <text x="20" y="251" dominant-baseline="middle"
        font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="11" fill="#8b949e">
    Last deploy: 12 minutes ago  ·  3 decisions  ·  no hints
  </text>

  <!-- Play button -->
  <rect x="680" y="239" width="160" height="26" rx="5" fill="#58a6ff">
    <animate attributeName="opacity" values="1;0.75;1" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <text x="760" y="252" text-anchor="middle" dominant-baseline="middle"
        font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="12" font-weight="700" fill="#0d1117">
    ▶  Respond now
  </text>

</svg>
